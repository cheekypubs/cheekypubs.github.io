<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e4dc"/>
      <stop offset="100%" style="stop-color:#f0d5c8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Decorative borders -->
  <rect x="0" y="0" width="600" height="4" fill="#C0392B" opacity="0.5"/>
  <rect x="0" y="596" width="600" height="4" fill="#C0392B" opacity="0.5"/>

  <!-- Open book icon -->
  <g transform="translate(300, 220)" fill="none" stroke="#C0392B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <path d="M0,-45 C0,-45 -70,-52 -78,-30 L-78,45 C-70,30 0,38 0,38"/>
    <path d="M0,-45 C0,-45 70,-52 78,-30 L78,45 C70,30 0,38 0,38"/>
    <line x1="0" y1="-45" x2="0" y2="38"/>
    <line x1="-56" y1="-15" x2="-16" y2="-15" opacity="0.4"/>
    <line x1="-58" y1="0" x2="-16" y2="0" opacity="0.4"/>
    <line x1="-54" y1="15" x2="-16" y2="15" opacity="0.4"/>
    <line x1="16" y1="-15" x2="56" y2="-15" opacity="0.4"/>
    <line x1="16" y1="0" x2="58" y2="0" opacity="0.4"/>
    <line x1="16" y1="15" x2="54" y2="15" opacity="0.4"/>
  </g>

  <!-- Site name -->
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#5C4033" font-weight="bold" letter-spacing="2">
