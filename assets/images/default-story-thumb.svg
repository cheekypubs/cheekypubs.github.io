<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Warm background -->
  <rect width="1200" height="600" fill="#f4e4dc"/>

  <!-- Book body centered -->
  <g transform="translate(600, 300)">
    <!-- Left page -->
    <path d="M-8,-110 C-8,-110 -145,-122 -158,-85 L-158,110 C-145,85 -8,98 -8,98 Z" fill="#fff" stroke="#C0392B" stroke-width="4" opacity="0.85"/>
    <!-- Right page -->
    <path d="M8,-110 C8,-110 145,-122 158,-85 L158,110 C145,85 8,98 8,98 Z" fill="#fff" stroke="#C0392B" stroke-width="4" opacity="0.85"/>
    <!-- Spine -->
    <line x1="0" y1="-110" x2="0" y2="98" stroke="#C0392B" stroke-width="3"/>
    <!-- Left page lines -->
    <line x1="-120" y1="-40" x2="-28" y2="-38" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-125" y1="-10" x2="-28" y2="-8" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-125" y1="20" x2="-28" y2="22" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-120" y1="50" x2="-28" y2="52" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <!-- Right page lines -->
    <line x1="28" y1="-38" x2="120" y2="-40" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="28" y1="-8" x2="125" y2="-10" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="28" y1="22" x2="125" y2="20" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="28" y1="52" x2="120" y2="50" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
  </g>
</svg>
