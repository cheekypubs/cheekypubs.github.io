<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- Warm background -->
  <rect width="600" height="600" fill="#f4e4dc"/>

  <!-- Book body -->
  <g transform="translate(300, 280)">
    <!-- Left page -->
    <path d="M-8,-90 C-8,-90 -120,-100 -130,-70 L-130,90 C-120,70 -8,80 -8,80 Z" fill="#fff" stroke="#C0392B" stroke-width="4" opacity="0.85"/>
    <!-- Right page -->
    <path d="M8,-90 C8,-90 120,-100 130,-70 L130,90 C120,70 8,80 8,80 Z" fill="#fff" stroke="#C0392B" stroke-width="4" opacity="0.85"/>
    <!-- Spine -->
    <line x1="0" y1="-90" x2="0" y2="80" stroke="#C0392B" stroke-width="3"/>
    <!-- Left page lines -->
    <line x1="-100" y1="-30" x2="-25" y2="-30" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-105" y1="-5" x2="-25" y2="-5" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-105" y1="20" x2="-25" y2="20" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="-100" y1="45" x2="-25" y2="45" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <!-- Right page lines -->
    <line x1="25" y1="-30" x2="100" y2="-30" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="25" y1="-5" x2="105" y2="-5" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="25" y1="20" x2="105" y2="20" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
    <line x1="25" y1="45" x2="100" y2="45" stroke="#C0392B" stroke-width="2" opacity="0.25"/>
  </g>
</svg>
