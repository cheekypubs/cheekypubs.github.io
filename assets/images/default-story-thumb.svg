<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e4dc"/>
      <stop offset="100%" style="stop-color:#f0d5c8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Decorative top/bottom borders -->
  <rect x="0" y="0" width="640" height="4" fill="#C0392B" opacity="0.5"/>
  <rect x="0" y="356" width="640" height="4" fill="#C0392B" opacity="0.5"/>

  <!-- Open book icon -->
  <g transform="translate(320, 140)" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Left page -->
    <path d="M0,-30 C0,-30 -50,-35 -55,-20 L-55,30 C-50,20 0,25 0,25"/>
    <!-- Right page -->
    <path d="M0,-30 C0,-30 50,-35 55,-20 L55,30 C50,20 0,25 0,25"/>
    <!-- Spine -->
    <line x1="0" y1="-30" x2="0" y2="25"/>
    <!-- Left text lines -->
    <line x1="-40" y1="-10" x2="-12" y2="-10" opacity="0.4"/>
    <line x1="-42" y1="0" x2="-12" y2="0" opacity="0.4"/>
    <line x1="-38" y1="10" x2="-12" y2="10" opacity="0.4"/>
    <!-- Right text lines -->
    <line x1="12" y1="-10" x2="40" y2="-10" opacity="0.4"/>
    <line x1="12" y1="0" x2="42" y2="0" opacity="0.4"/>
    <line x1="12" y1="10" x2="38" y2="10" opacity="0.4"/>
  </g>

  <!-- Site name -->
  <text x="320" y="220" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#5C4033" font-weight="bold" letter-spacing="2">
    Cheeky Pubs
  </text>

  <!-- Decorative divider -->
  <text x="320" y="248" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#C0392B" opacity="0.6">
    ~&#160;&#8226;&#160;~
  </text>

  <!-- Tagline -->
  <text x="320" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5C4033" opacity="0.65">
    Quality Spanking Stories
  </text>
</svg>
