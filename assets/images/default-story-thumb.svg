    ~&#160;&#8226;&#160;~
  </text>

  <!-- Tagline -->
  <text x="300" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4033" opacity="0.65">
    Quality Spanking Stories
  </text>
</svg>
