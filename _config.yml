# Cheeky Pubs - Stories Site
title: Cheeky Pubs
description: A collection of stories from the Cheeky community.

# Site URL
url: "https://cheeky.pub"
baseurl: ""

# Google Analytics
google_analytics: "G-06VR2CPVFH"

# Email signup
email_signup_action: "https://emailoctopus.com/lists/00b2114a-47e4-11f1-a85b-97bcd90c99b6/members/embedded/1.3/add"

# Build Settings
markdown: kramdown
theme: minima
permalink: pretty
future: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  stories:
    output: true
    permalink: /:path/

# Defaults for stories collection
defaults:
  - scope:
      path: ""
      type: "stories"
    values:
      layout: "story"

# Exclusions
exclude:
  - README.md
  - netlify.toml
  - netlify/
