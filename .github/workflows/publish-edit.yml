name: Publish story edit

on:
  repository_dispatch:
    types: [story-edit]

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update story file
        id: update-story-file
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};

            // Validate storyUrl: only allow alphanumeric, hyphens, underscores (no path traversal)
            const rawUrl = (payload.storyUrl || '').replace(/^\/|\/$/g, '');
            if (!/^[a-zA-Z0-9_-]+$/.test(rawUrl)) {
              core.setFailed(`Invalid storyUrl: ${rawUrl}`);
              return;
            }
            const storyUrl = rawUrl;

            const title = (payload.title || '').trim();
            const author = (payload.author || 'Anonymous').trim();

            // Validate date format (YYYY-MM-DD)
            const rawDate = (payload.date || '').trim();
            const date = /^\d{4}-\d{2}-\d{2}$/.test(rawDate) ? rawDate : new Date().toISOString().slice(0,10);

            // Sanitize tags: strip YAML special characters and newlines
            const rawTags = Array.isArray(payload.tags) ? payload.tags : [];
            const tags = rawTags.map(t => String(t).replace(/[\r\n:#\[\]{}&*!|>'"%@`]/g, '').trim()).filter(t => t.length > 0);

            const description = (payload.description || '').trim();
            const artwork = payload.artwork || {};
            let artImage = (artwork.image || '').trim();
            let artAlt = (artwork.alt || '').trim();
            let artCaption = (artwork.caption || '').trim();
            const series = payload.series || {};
            const storyId = (series.id || '').trim();
            const chapter = series.chapter ? parseInt(series.chapter) : null;
            const chapterTitle = (series.title || '').trim();
            const content = (payload.content || '').trim();

            if (!storyUrl || !title || !content) {
              core.setFailed('storyUrl, title, and content are required');
              return;
            }

            const filepath = `_stories/${storyUrl}.md`;
            const fs = require('fs');
            const path = require('path');

            if (!fs.existsSync(filepath)) {
              core.setFailed(`Story file not found: ${filepath}`);
              return;
            }

            function parseFrontMatter(fileContent) {
              const match = fileContent.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
              return match ? match[1] : '';
            }

            function getYamlValue(yaml, key) {
              const regex = new RegExp(`^${key}:\\s*["']?([^"'\\n]+)["']?\\s*$`, 'm');
              const match = yaml.match(regex);
              return match ? String(match[1]).trim() : '';
            }

            function getSeriesArtwork(seriesId, currentFilePath) {
              if (!seriesId) return null;
              const storiesDir = '_stories';
              if (!fs.existsSync(storiesDir)) return null;

              const candidates = [];
              for (const name of fs.readdirSync(storiesDir)) {
                if (!name.endsWith('.md')) continue;
                const candidatePath = path.join(storiesDir, name);
                if (candidatePath === currentFilePath) continue;

                const raw = fs.readFileSync(candidatePath, 'utf8');
                const yaml = parseFrontMatter(raw);
                if (!yaml) continue;
                if (getYamlValue(yaml, 'story_id') !== seriesId) continue;

                const image = getYamlValue(yaml, 'art_image');
                if (!image) continue;

                const chapterValue = parseInt(getYamlValue(yaml, 'chapter'), 10);
                candidates.push({
                  chapter: Number.isFinite(chapterValue) ? chapterValue : Number.MAX_SAFE_INTEGER,
                  image,
                  alt: getYamlValue(yaml, 'art_alt'),
                  caption: getYamlValue(yaml, 'art_caption')
                });
              }

              if (candidates.length === 0) return null;
              candidates.sort((a, b) => a.chapter - b.chapter);
              return candidates[0];
            }

            if (storyId && (!artImage || !artAlt || !artCaption)) {
              const inheritedArtwork = getSeriesArtwork(storyId, filepath);
              if (inheritedArtwork) {
                if (!artImage) artImage = inheritedArtwork.image || '';
                if (!artAlt) artAlt = inheritedArtwork.alt || '';
                if (!artCaption) artCaption = inheritedArtwork.caption || '';
              }
            }

            // Build front matter
            let frontMatter = `---\nlayout: story\ntitle: "${title.replace(/"/g, '\\"')}"\nauthor: "${author.replace(/"/g, '\\"')}"\ndate: ${date} 12:00:00 -0500\n`;
            if (description) frontMatter += `description: "${description.replace(/"/g, '\\"')}"\n`;
            if (artImage) frontMatter += `art_image: "${artImage.replace(/"/g, '\\"')}"\n`;
            if (artAlt) frontMatter += `art_alt: "${artAlt.replace(/"/g, '\\"')}"\n`;
            if (artCaption) frontMatter += `art_caption: "${artCaption.replace(/"/g, '\\"')}"\n`;
            if (storyId) frontMatter += `story_id: "${storyId}"\n`;
            if (chapter) frontMatter += `chapter: ${chapter}\n`;
            if (chapterTitle) frontMatter += `chapter_title: "${chapterTitle.replace(/"/g, '\\"')}"\n`;
            if (tags.length > 0) {
              frontMatter += 'tags:\n';
              tags.forEach(tag => { frontMatter += `  - "${tag}"\n`; });
            }
            frontMatter += '---\n';

            fs.writeFileSync(filepath, `${frontMatter}\n${content}\n`);
            core.setOutput('filepath', filepath);
            // Sanitize title for use in git commit message
            core.setOutput('title', title.replace(/[`$\\"\n\r]/g, ''));

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _stories/
          git commit -m "Edit story: ${{ steps.update-story-file.outputs.title || 'story' }}" || echo "No changes to commit"
          git push
