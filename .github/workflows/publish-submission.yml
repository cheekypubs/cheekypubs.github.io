name: Publish story from submission

on:
  repository_dispatch:
    types: [story-submission]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create story file
        id: create-story-file
        uses: actions/github-script@v7
        with:
          script: |
            const helpers = require('./scripts/story-helpers.js');
            const fs = require('fs');
            const path = require('path');

            const payload = context.payload.client_payload || {};
            const title = (payload.title || 'Untitled').trim();
            let content = payload.content || '';
            const now = new Date();
            const date = now.toISOString().slice(0,10);

            // Parse incoming front matter first so we can extract metadata needed for filename
            const parsedIncoming = helpers.splitFrontMatter(content);

            // Resolve chapter number and story_id: payload fields take precedence,
            // but fall back to values embedded in the front matter so that chapter 2+
            // always gets a unique filename even when the API layer omits these fields.
            let chapterNumber = null;
            if (payload.chapterNumber !== undefined && payload.chapterNumber !== null) {
              const n = parseInt(payload.chapterNumber, 10);
              if (Number.isFinite(n)) chapterNumber = n;
            }
            let storyId = payload.storyId ? String(payload.storyId).trim() : '';
            if (parsedIncoming) {
              if (!chapterNumber) {
                const ch = parseInt(helpers.getYamlValue(parsedIncoming.yaml, 'chapter'), 10);
                if (Number.isFinite(ch)) chapterNumber = ch;
              }
              if (!storyId) {
                storyId = helpers.getYamlValue(parsedIncoming.yaml, 'story_id');
              }
            }

            // Create slug from title
            let slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,50);
            if (!slug) slug = now.toISOString().replace(/[:.]/g,'-');
            
            // Add chapter suffix for multi-chapter stories (chapter 2+) to prevent
            // same-day uploads of different chapters from overwriting each other
            let filename;
            if (storyId && Number.isFinite(chapterNumber) && chapterNumber > 1) {
              filename = `${date}-${slug}-ch${chapterNumber}.md`;
            } else {
              filename = `${date}-${slug}.md`;
            }
            
            const filepath = `_stories/${filename}`;

            if (parsedIncoming) {
              let yaml = parsedIncoming.yaml;
              const body = parsedIncoming.body;

              const inferredStoryId = helpers.getYamlValue(yaml, 'story_id') || storyId;
              const artFields = {
                image: helpers.getYamlValue(yaml, 'art_image')
              };

              helpers.inheritSeriesArtwork(inferredStoryId, filepath, artFields);

              if (artFields.image) yaml = helpers.upsertYamlValue(yaml, 'art_image', artFields.image);

              content = `---\n${yaml}\n---\n\n${body.replace(/^\n+/, '')}`;
            }
            
            // Content already includes front matter from client, just save it directly
            fs.writeFileSync(filepath, content + '\n');

            // Keep shared series artwork across all chapters when story_id is present
            const savedParsed = helpers.splitFrontMatter(content);
            if (savedParsed) {
              const savedStoryId = helpers.getYamlValue(savedParsed.yaml, 'story_id');
              helpers.propagateSeriesArtwork(
                savedStoryId, filepath,
                helpers.getYamlValue(savedParsed.yaml, 'art_image')
              );
            }

            // Pass title to commit step
            core.setOutput('title', title.replace(/[`$\\"\n\r]/g, ''));

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _stories/*.md
          git commit -m "Add story: ${{ steps.create-story-file.outputs.title || 'Untitled' }}" || echo "No changes to commit"
          git push
